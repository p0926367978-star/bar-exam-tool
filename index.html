<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六法工具箱｜法條分類查詢</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f3b2c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="六法工具箱">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Sans+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cover-green:#1f3b2c;
    --cover-green-dark:#152a1f;
    --page-cream:#f6f1e4;
    --page-cream-2:#efe8d6;
    --ink:#241f16;
    --ink-soft:#5a5142;
    --gold:#b08d57;
    --gold-bright:#d4af6a;
    --seal-red:#9e2a2b;
    --seal-red-soft:#c65b4f;
    --rule:#d8cdb0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Noto Sans TC',sans-serif;
    background:var(--page-cream);
    color:var(--ink);
    display:flex;
    min-height:100vh;
  }
  ::selection{background:var(--gold-bright);color:var(--cover-green-dark);}

  .cover{
    width:280px;
    min-width:280px;
    background:linear-gradient(160deg,var(--cover-green) 0%, var(--cover-green-dark) 100%);
    color:var(--page-cream);
    padding:28px 20px 20px;
    display:flex;
    flex-direction:column;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .cover::-webkit-scrollbar{width:6px;}
  .cover::-webkit-scrollbar-thumb{background:rgba(212,175,106,0.4);border-radius:4px;}

  .brand{
    font-family:'Noto Serif TC',serif;
    font-weight:900;
    font-size:22px;
    letter-spacing:2px;
    border-bottom:1px solid rgba(212,175,106,0.35);
    padding-bottom:16px;
    margin-bottom:6px;
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .brand .gold-dot{color:var(--gold-bright);font-size:14px;}
  .brand-sub{
    font-size:11px;
    letter-spacing:3px;
    color:var(--gold-bright);
    margin-bottom:16px;
    text-transform:uppercase;
  }
  .account-badge{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--page-cream);
    background:rgba(212,175,106,0.12);
    border:1px solid rgba(212,175,106,0.35);
    border-radius:8px;
    padding:8px 10px;
    margin-bottom:14px;
    word-break:break-all;
  }
  .account-badge .acc-icon{flex-shrink:0; color:var(--gold-bright);}
  .cover-search{
    margin-bottom:14px;
  }
  .cover-search input{
    width:100%;
    padding:8px 10px;
    border-radius:6px;
    border:1px solid rgba(212,175,106,0.35);
    background:rgba(255,255,255,0.06);
    color:var(--page-cream);
    font-size:12.5px;
    outline:none;
  }
  .cover-search input::placeholder{color:rgba(246,241,228,0.5);}

  .global-search-box{margin-bottom:14px;}
  .global-search-box input{
    width:100%;
    padding:9px 10px;
    border-radius:6px;
    border:1.5px solid var(--gold-bright);
    background:rgba(212,175,106,0.1);
    color:var(--page-cream);
    font-size:12.5px;
    outline:none;
  }
  .global-search-box input::placeholder{color:rgba(246,241,228,0.55);}
  .global-search-hint{font-size:10.5px; color:rgba(246,241,228,0.5); margin-top:5px; line-height:1.5;}

  .global-search-overlay{
    position:fixed; inset:0; background:rgba(20,15,8,0.55);
    z-index:900; display:flex; align-items:flex-start; justify-content:center;
    padding:40px 20px; overflow-y:auto;
  }
  .global-search-panel{
    background:var(--page-cream); border-radius:12px; max-width:820px; width:100%;
    padding:24px 26px; box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .global-search-panel-head{
    display:flex; justify-content:space-between; align-items:center;
    font-family:'Noto Serif TC',serif; font-weight:800; font-size:18px;
    margin-bottom:16px; color:var(--ink);
  }
  .global-search-results{max-height:70vh; overflow-y:auto;}
  .gsr-item{
    background:#fff; border:1px solid var(--rule); border-left:4px solid var(--gold);
    border-radius:8px; padding:14px 16px; margin-bottom:12px; cursor:pointer;
  }
  .gsr-item:hover{border-left-color:var(--seal-red);}
  .gsr-law{font-size:11px; font-weight:700; color:var(--seal-red); letter-spacing:1px;}
  .gsr-no{font-family:'Noto Sans Mono',monospace; font-weight:700; font-size:12.5px; color:var(--cover-green); margin-left:8px;}
  .gsr-snippet{font-size:13px; color:var(--ink-soft); margin-top:6px; line-height:1.7;}
  .gsr-snippet mark{background:var(--gold-bright); color:var(--ink); padding:0 2px; border-radius:2px;}
  .gsr-field-tag{
    display:inline-block; font-size:10px; font-weight:700; color:var(--gold);
    border:1px solid var(--gold); border-radius:4px; padding:1px 6px; margin-right:6px;
  }

  .log-date-group{margin-bottom:20px;}
  .log-date-head{
    font-family:'Noto Serif TC',serif; font-weight:800; font-size:14.5px;
    color:var(--seal-red); margin-bottom:8px; padding-bottom:4px;
    border-bottom:1.5px dashed var(--gold);
  }
  .log-date-count{font-family:'Noto Sans Mono',monospace; font-size:11px; color:var(--ink-soft); font-weight:400;}
  .log-item{
    background:#fff; border:1px solid var(--rule); border-left:4px solid var(--gold);
    border-radius:8px; padding:10px 14px; margin-bottom:8px; cursor:pointer;
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .log-item:hover{border-left-color:var(--seal-red);}
  .log-law{font-size:11px; font-weight:700; color:var(--seal-red); letter-spacing:1px;}
  .log-no{font-family:'Noto Sans Mono',monospace; font-weight:700; font-size:12.5px; color:var(--cover-green);}
  .log-field-tag{
    margin-left:auto; font-size:10px; font-weight:700; color:var(--gold);
    border:1px solid var(--gold); border-radius:4px; padding:2px 7px; white-space:nowrap;
  }

  .law-nav{list-style:none;margin:0;padding:0;flex:1;}
  .law-item{margin-bottom:4px; display:flex; align-items:stretch; gap:4px;}
  .law-cat{list-style:none; margin-bottom:6px;}
  .law-cat-header{
    width:100%;
    display:flex; align-items:center; gap:8px;
    background:rgba(212,175,106,0.10);
    border:1px solid rgba(212,175,106,0.30);
    border-radius:7px;
    color:var(--gold-bright);
    font-family:'Noto Serif TC',serif;
    font-weight:800;
    font-size:13.5px;
    letter-spacing:2px;
    padding:8px 10px;
    cursor:pointer;
    margin-bottom:4px;
  }
  .law-cat-header:hover{background:rgba(212,175,106,0.18);}
  .law-cat-arrow{font-size:11px; width:12px;}
  .law-cat-count{
    margin-left:auto;
    font-family:'Noto Sans Mono',monospace;
    font-size:11px;
    font-weight:400;
    color:rgba(246,241,228,0.55);
  }
  .law-cat-body{list-style:none; margin:0 0 2px 0; padding-left:10px;}
  .law-delete-btn{
    flex-shrink:0;
    width:32px;
    background:transparent;
    border:1px solid transparent;
    border-radius:6px;
    color:rgba(246,241,228,0.35);
    font-size:13px;
    cursor:pointer;
  }
  .law-delete-btn:hover{background:rgba(196,74,58,0.15); border-color:var(--seal-red-soft); color:var(--seal-red-soft);}
  .law-btn{
    flex:1;
    min-width:0;
    text-align:left;
    background:transparent;
    border:none;
    color:var(--page-cream);
    font-family:'Noto Sans TC',sans-serif;
    font-size:14px;
    font-weight:500;
    padding:9px 10px;
    border-radius:6px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:background .15s ease;
  }
  .law-btn:hover{background:rgba(212,175,106,0.12);}
  .law-btn.active{background:rgba(212,175,106,0.22); color:var(--gold-bright); font-weight:700;}
  .law-count{
    font-family:'Noto Sans Mono',monospace;
    font-size:10.5px;
    color:rgba(246,241,228,0.55);
  }
  .law-btn.active .law-count{color:var(--gold-bright);}

  .export-data-btn{
    width:100%;
    background:rgba(212,175,106,0.15);
    border:1.5px solid var(--gold-bright);
    color:var(--gold-bright);
    font-size:12.5px;
    font-weight:700;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:6px;
  }
  .export-data-btn:hover{background:rgba(212,175,106,0.28);}
  .export-data-btn:disabled{opacity:0.5; cursor:default;}
  .export-progress-label{
    font-size:10.5px;
    color:rgba(246,241,228,0.6);
    text-align:center;
    margin-bottom:10px;
    min-height:14px;
  }
  .cover-footer{
    font-size:10.5px;
    color:rgba(246,241,228,0.45);
    border-top:1px solid rgba(212,175,106,0.25);
    padding-top:14px;
    line-height:1.7;
  }

  .page{
    flex:1;
    padding:36px 44px 60px;
    max-width:1000px;
  }
  .page-head{margin-bottom:26px;}
  .kicker{
    font-family:'Noto Sans Mono',monospace;
    font-size:11.5px;
    letter-spacing:2px;
    color:var(--seal-red);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    font-family:'Noto Serif TC',serif;
    font-weight:900;
    font-size:32px;
    margin:0 0 6px;
    color:var(--ink);
  }
  .law-desc{color:var(--ink-soft);font-size:14px;margin:0;}
  .source-link{
    display:inline-block;
    margin-top:10px;
    font-size:12px;
    font-weight:600;
    color:var(--seal-red);
    text-decoration:none;
    border-bottom:1px dashed var(--seal-red-soft);
  }
  .source-link:hover{color:var(--seal-red-soft);}
  .add-entry-btn{
    display:inline-block;
    margin-top:12px;
    margin-left:14px;
    background:var(--cover-green);
    color:var(--page-cream);
    font-weight:700;
    font-size:12.5px;
    padding:8px 16px;
    border:none;
    border-radius:20px;
    cursor:pointer;
  }
  .add-entry-btn:hover{background:var(--cover-green-dark);}
  .print-btn{background:var(--seal-red); margin-left:0;}
  .print-btn:hover{background:var(--seal-red-soft);}

  @media print{
    .cover, .global-search-overlay, .add-entry-overlay, .lightbox-overlay,
    #backToTopBtn, .outline-block, .note-banner-block,
    .toolbar, .tested-filter-row, .range-indicator,
    .note-toolbar, .reset-btn, .save-indicator, .tested-toggle,
    .exam-add-image-btn, .exam-thumb-delete, .pdf-upload-btn,
    .pdf-open-newtab, .attach-pdf-head button, .has-note-badge,
    .print-btn, .add-entry-btn, .source-link, .kicker
    { display:none !important; }
    body{ display:block !important; background:#fff; }
    .page{ padding:0; max-width:100%; }
    .card{ break-inside:avoid; border:1px solid #999; box-shadow:none; }
    .note-area{ border:1px solid #ccc; background:#fff; }
    .law-article-block, .law-article-block.single{ background:#f5f5f0; }
    .pdf-preview-box{ height:auto; min-height:200px; background:#fff; }
  }
  .add-entry-overlay{
    position:fixed; inset:0; background:rgba(20,15,8,0.55);
    z-index:950; display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .add-entry-panel{
    background:var(--page-cream); border-radius:12px; max-width:440px; width:100%;
    padding:24px 26px; box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .add-entry-head{
    display:flex; justify-content:space-between; align-items:center;
    font-family:'Noto Serif TC',serif; font-weight:800; font-size:18px;
    margin-bottom:14px; color:var(--ink);
  }
  .add-entry-label{
    display:block; font-size:12px; font-weight:700; color:var(--ink-soft);
    margin:12px 0 4px;
  }
  .add-entry-error{color:var(--seal-red); font-size:12.5px; min-height:18px; margin-top:6px;}

  .toolbar{
    display:flex;
    gap:10px;
    margin:22px 0 12px;
    flex-wrap:wrap;
    align-items:center;
  }
  .search-wrap{position:relative; flex:1; min-width:220px;}
  .search-wrap input{
    width:100%;
    padding:11px 14px 11px 38px;
    border:1.5px solid var(--rule);
    border-radius:8px;
    background:#fff;
    font-size:14.5px;
    font-family:'Noto Sans TC',sans-serif;
    color:var(--ink);
    outline:none;
    transition:border-color .15s;
  }
  .search-wrap input:focus{border-color:var(--gold);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none;}

  .chip-filter{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{
    border:1.5px solid var(--rule);
    background:#fff;
    color:var(--ink-soft);
    padding:7px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:500;
    cursor:pointer;
    white-space:nowrap;
    transition:all .15s;
  }
  .chip:hover{border-color:var(--gold);}
  .chip.active{background:var(--cover-green);border-color:var(--cover-green);color:var(--page-cream);}

  .chapter-scroll{
    max-height:64px;
    overflow-y:auto;
    padding-bottom:4px;
    margin-bottom:14px;
  }

  .tested-filter-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }
  .tf-label{font-size:12.5px;font-weight:600;color:var(--ink-soft);white-space:nowrap;}
  .tf-chip.active[data-tf="yes"]{background:#3d7a4f;border-color:#3d7a4f;color:#fff;}
  .tf-chip.active[data-tf="no"]{background:var(--seal-red-soft);border-color:var(--seal-red-soft);color:#fff;}
  .tf-chip.active[data-tf="unset"]{background:var(--ink-soft);border-color:var(--ink-soft);color:#fff;}

  .result-count{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}

  .card{
    background:#fff;
    border:1px solid var(--rule);
    border-left:4px solid var(--gold);
    border-radius:10px;
    padding:20px 22px;
    margin-bottom:16px;
    position:relative;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:10px;
  }
  .article-no{
    font-family:'Noto Sans Mono',monospace;
    font-weight:700;
    font-size:13px;
    color:#fff;
    background:var(--cover-green);
    padding:4px 10px;
    border-radius:5px;
    white-space:nowrap;
  }
  .chapter-tag{font-size:11.5px;color:var(--ink-soft); margin-top:6px;}
  .article-title-mini{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:14px;
    color:var(--ink-soft);
    margin-top:4px;
  }
  .english-block{
    font-family:'Noto Sans TC',sans-serif;
    font-style:normal;
    font-size:13.5px;
    line-height:1.85;
    color:var(--ink-soft);
    padding:10px 14px;
    background:#fff;
    border:1px dashed var(--rule);
    border-radius:4px;
  }
  .english-block .eng-para + .eng-para{margin-top:10px;}
  .english-block .eng-num{
    font-family:'Noto Sans Mono',monospace;
    font-weight:700;
    color:var(--ink-soft);
    margin-right:6px;
  }
  .english-block.empty{
    color:#a89f8c;
    font-style:italic;
  }
  .block{margin-top:12px;}
  .block-label{
    font-size:11px;
    font-weight:700;
    letter-spacing:1.5px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:5px;
  }
  .divider{height:1px;background:var(--rule);margin:14px 0;}

  .law-article-block{
    background:var(--page-cream-2);
    border-left:3px solid var(--gold);
    border-radius:4px;
    padding:14px 16px;
  }
  .law-para-row{display:flex;gap:14px;align-items:flex-start;}
  .law-para-row + .law-para-row{margin-top:12px;}
  .law-para-num{
    font-family:'Noto Serif TC',serif;
    font-style:italic;
    font-weight:700;
    color:var(--ink-soft);
    font-size:14px;
    min-width:16px;
    padding-top:1px;
  }
  .law-para-text{
    font-family:'Noto Serif TC',serif;
    font-size:15.5px;
    line-height:2;
    color:var(--ink);
    white-space:pre-line;
  }
  .law-article-block.single .law-para-text{
    font-family:'Noto Serif TC',serif;
    font-size:15.5px;
    line-height:2;
    color:var(--ink);
    white-space:pre-line;
  }

  .note-block{margin-top:14px;}
  .note-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
  .note-label{color:var(--seal-red);margin-bottom:0;}
  .note-actions{display:flex;align-items:center;gap:10px;}
  .save-indicator{font-size:11px;font-family:'Noto Sans Mono',monospace;color:var(--ink-soft);min-width:60px;text-align:right;white-space:nowrap;}
  .save-indicator.saved{color:#3d7a4f;}
  .save-indicator.error{color:var(--seal-red);}
  .save-indicator.offline{color:var(--seal-red); font-weight:700; animation:offline-pulse 1.4s ease-in-out infinite;}
  @keyframes offline-pulse{ 0%,100%{opacity:1;} 50%{opacity:0.45;} }
  .reset-btn{
    font-size:11px;color:var(--ink-soft);background:transparent;
    border:1px solid var(--rule);border-radius:14px;padding:4px 10px;cursor:pointer;white-space:nowrap;
  }
  .reset-btn:hover{border-color:var(--seal-red-soft); color:var(--seal-red-soft);}
  .note-area.scrollable-original{
    max-height:420px;
    overflow-y:auto;
    font-family:'Noto Serif TC',serif;
    font-size:15px;
    line-height:1.9;
    background:var(--page-cream-2);
    border-left:3px solid var(--gold);
  }
  .pdf-preview-box{
    height:420px;
    border:1.5px solid var(--rule);
    border-left:3px solid var(--gold);
    border-radius:6px;
    overflow:hidden;
    background:#525659;
    position:relative;
  }
  .pdf-preview-box iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
  }
  .pdf-open-newtab{
    position:absolute;
    bottom:8px;
    right:8px;
    background:rgba(0,0,0,0.65);
    color:#fff;
    font-size:11px;
    font-family:'Noto Sans TC',sans-serif;
    padding:5px 10px;
    border-radius:14px;
    text-decoration:none;
  }
  .pdf-open-newtab:hover{background:rgba(0,0,0,0.85);}
  .pdf-loading-msg{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:13px; font-family:'Noto Sans TC',sans-serif;
  }
  .pdf-upload-row{display:flex; gap:8px; align-items:center; margin-bottom:6px; flex-wrap:wrap;}
  .pdf-upload-btn{
    font-size:12px; font-weight:700; color:var(--ink-soft);
    background:#fff; border:1px solid var(--rule); border-radius:5px;
    padding:4px 9px; cursor:pointer; line-height:1;
  }
  .pdf-upload-btn:hover{border-color:var(--gold); color:var(--ink);}
  .pdf-upload-btn.remove-pdf{color:var(--seal-red); border-color:var(--seal-red-soft);}
  .note-area{
    width:100%;
    min-height:90px;
    border:1.5px solid var(--rule);
    border-radius:6px;
    padding:12px 14px;
    font-family:'Noto Sans TC',sans-serif;
    font-size:14px;
    line-height:1.85;
    color:var(--ink);
    background:#fffdf8;
    outline:none;
    overflow-wrap:break-word;
  }
  .note-area:focus{border-color:var(--seal-red-soft);}
  .note-area:empty:before{
    content:attr(data-placeholder);
    color:#a89f8c;
  }
  .note-area ul{margin:0; padding-left:22px;}
  .note-area ul ul{padding-left:20px; margin-top:2px;}
  .note-area ul ul{list-style-type:circle;}
  .note-area ul ul ul{list-style-type:square;}
  .note-area li{margin:2px 0;}
  .note-area s, .note-area strike{color:#a89f8c;}

  .note-toolbar{
    display:flex;
    gap:6px;
    margin-bottom:6px;
  }

<script>
// ---------- Storage backends ----------
// Priority: (1) Claude's native window.storage, if present — used unchanged.
//           (2) Firebase (Firestore), if this build has Firebase configured — requires login,
//               and syncs across every device you log into.
//           (3) Browser localStorage — single-device fallback, no login needed.
// Everything else in this app just calls window.storage.* and doesn't know or
// care which backend is actually in use underneath.

const CLAUDE_STORAGE_AVAILABLE = (typeof window.storage !== 'undefined');

function makeLocalStorageBackend(){
  const LS_PREFIX = 'lawtool::';
  return {
    async get(key, shared){
      const raw = localStorage.getItem(LS_PREFIX + key);
      if(raw === null) throw new Error('key not found: ' + key);
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem(LS_PREFIX + key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem(LS_PREFIX + key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const fullPrefix = LS_PREFIX + (prefix || '');
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(k && k.startsWith(fullPrefix)) keys.push(k.slice(LS_PREFIX.length));
      }
      return { keys, prefix, shared: !!shared };
    }
  };
}

function makeFirestoreBackend(uid){
  const fb = window.__firebase;
  const kvColl = fb.collection(fb.db, `users/${uid}/kv`);
  return {
    async get(key, shared){
      const ref = fb.doc(kvColl, key);
      const snap = await fb.getDoc(ref);
      if(!snap.exists()) throw new Error('key not found: ' + key);
      return { key, value: snap.data().value, shared: !!shared };
    },
    async set(key, value, shared){
      const ref = fb.doc(kvColl, key);
      await fb.setDoc(ref, { value });
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      const ref = fb.doc(kvColl, key);
      await fb.deleteDoc(ref);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const p = prefix || '';
      const q = fb.query(kvColl, fb.orderBy(fb.documentId()), fb.startAt(p), fb.endAt(p + '\uf8ff'));
      const snaps = await fb.getDocs(q);
      const keys = [];
      snaps.forEach(s => keys.push(s.id));
      return { keys, prefix, shared: !!shared };
    }
  };
}

const LAW_KEYS_EXPECTED = ["civil","foreign","civpro","securities","company","criminal","crimpro","localgov","admexec","admproc","admpenalty","insurance","family","statecomp","compulsory","negotiable","appeal","constitution","constcourt","justiceinterp","concourtjudg"];

const testedCache = {};
const testedLoaded = {};
const fieldCache = { note: {}, exam: {}, unclassified: {}, answerCopy: {}, originalText: {}, origHighlight: {}, engHighlight: {} };   // field -> lawKey -> { [no]: overriddenValue }
const EDITABLE_ORIGINAL_LAWS = ["justiceinterp", "concourtjudg"];
const UNCLASSIFIED_IMG_NO = "（整體筆記）"; // sentinel "no" for unclassified-note images, never collides with a real article no
const fieldLoaded = { note: {}, exam: {} };

function testedKeyPrefix(lawKey){ return `tested::${lawKey}::`; }
function fieldKeyPrefix(field, lawKey){ return `${field}::${lawKey}::`; }

function ensureTestedLoaded(lawKey){
  if(testedLoaded[lawKey]) return testedLoaded[lawKey];
  testedCache[lawKey] = testedCache[lawKey] || {};
  testedLoaded[lawKey] = (async ()=>{
    try{
      const listRes = await window.storage.list(testedKeyPrefix(lawKey), false);
      const keys = (listRes && listRes.keys) || [];
      for(const k of keys){
        try{
          const res = await window.storage.get(k, false);
          if(res && (res.value === 'yes' || res.value === 'no')){
            testedCache[lawKey][k.slice(testedKeyPrefix(lawKey).length)] = res.value;
          }
        }catch(e){}
      }
    }catch(e){}
  })();
  return testedLoaded[lawKey];
}

function ensureFieldLoaded(field, lawKey){
  fieldLoaded[field] = fieldLoaded[field] || {};

// ---------- Autosave: flush every second, retrying automatically if offline/failed ----------
const pendingSaves = {}; // taId -> {field, lawKey, no, value}
const retryDelays = {};  // taId -> current backoff (ms), for gentle retry backoff
function queueSave(field, lawKey, no, value, taId){
  pendingSaves[taId] = { field, lawKey, no, value };
  delete retryDelays[taId]; // a fresh edit resets any backoff
  showSaving(taId, 'saving');
}
setInterval(async ()=>{
  const ids = Object.keys(pendingSaves);
  if(ids.length === 0) return;
  for(const taId of ids){
    const p = pendingSaves[taId];
    // if the user kept typing, a newer value is already queued under the same id;
    // only proceed with what's currently queued (we re-check after the async save below)
    const ok = await saveField(p.field, p.lawKey, p.no, p.value, taId);
    // only clear the queue entry if nothing newer has been queued in the meantime
    if(pendingSaves[taId] === p){
      if(ok){
        delete pendingSaves[taId];
        delete retryDelays[taId];
        showSaving(taId, 'saved');
      } else {
        // keep it queued so the next tick retries automatically; show a persistent offline notice
        showSaving(taId, 'offline');
      }
    }
  }
}, 1000);

window.addEventListener('beforeunload', (e)=>{
  if(Object.keys(pendingSaves).length > 0){
    e.preventDefault();
    e.returnValue = '還有內容尚未儲存，確定要離開嗎？';
    return e.returnValue;
  }
});

function showSaving(taId, state){
  const ind = document.getElementById(`ind_${taId}`);
  if(!ind) return;
  clearTimeout(ind._fadeTimer);
  if(state === 'saving'){
    ind.textContent = '儲存中…'; ind.className = 'save-indicator saving';
  } else if(state === 'saved'){
    ind.textContent = '已儲存 ✓'; ind.className = 'save-indicator saved';
    ind._fadeTimer = setTimeout(()=>{ if(ind) ind.textContent=''; }, 1800);
  } else if(state === 'offline'){
    ind.textContent = '⚠ 離線中，尚未儲存（會自動重試）'; ind.className = 'save-indicator offline';
  } else {
    ind.textContent = '儲存失敗'; ind.className = 'save-indicator error';
  }
}

function compressImageFile(file, maxDim=900, quality=0.72){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = () => reject(reader.error);
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width >= height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// ---------- Force-plain-text paste for every editable note area ----------
// Uses event delegation on document (always exists), so this is safe to attach
// at the top level even for note areas that only appear later inside dynamically
// rendered cards.
// ---------- Tab key indents/outdents list items, for multi-level 分點 ----------
// Manually restructures the <li>/<ul> DOM instead of relying on execCommand
// 'indent'/'outdent', since browser support for those on list items is inconsistent.
function findEnclosingLi(node, boundary){
  while(node && node !== boundary){
    if(node.nodeName === 'LI') return node;
    node = node.parentNode;
  }
  return null;
}

function indentLi(li){
  const prevLi = li.previousElementSibling;
  if(!prevLi || prevLi.nodeName !== 'LI') return false; // first item in its list, nothing to nest under
  let subUl = null;
  for(const child of prevLi.children){
    if(child.nodeName === 'UL' || child.nodeName === 'OL'){ subUl = child; break; }
  }
  if(!subUl){
    subUl = document.createElement('ul');
    prevLi.appendChild(subUl);
  }
  subUl.appendChild(li);
  return true;
}

function outdentLi(li){
  const parentUl = li.parentElement;
  if(!parentUl || (parentUl.nodeName !== 'UL' && parentUl.nodeName !== 'OL')) return false;
  const grandLi = parentUl.parentElement;
  if(!grandLi || grandLi.nodeName !== 'LI') return false; // already top-level
  const outerList = grandLi.parentElement;
  outerList.insertBefore(li, grandLi.nextSibling);
  if(parentUl.children.length === 0) parentUl.remove();
  return true;
}

document.addEventListener('keydown', (e)=>{
  if(e.key !== 'Tab') return;
  const target = e.target;
  if(!target || !target.classList || !target.classList.contains('note-area')) return;
  if(target.getAttribute('contenteditable') !== 'true') return;
  const sel = window.getSelection();
  if(!sel || sel.rangeCount === 0) return;
  const li = findEnclosingLi(sel.getRangeAt(0).startContainer, target);
  if(!li) return; // cursor isn't inside a list item — let Tab behave normally
  e.preventDefault();

  // remember where the cursor was within this <li> so we can restore it after moving the node
  const range = sel.getRangeAt(0);
  const savedContainer = range.startContainer;
  const savedOffset = range.startOffset;

  const moved = e.shiftKey ? outdentLi(li) : indentLi(li);
  if(moved){
    try{
      const newRange = document.createRange();
      newRange.setStart(savedContainer, savedOffset);
      newRange.collapse(true);
      sel.removeAllRanges();
      sel.addRange(newRange);
    }catch(err){}
    target.dispatchEvent(new Event('input', {bubbles:true}));
  }
});

document.addEventListener('paste', (e)=>{
  const target = e.target;
  if(!target || !target.classList || !target.classList.contains('note-area')) return;
  if(target.getAttribute('contenteditable') !== 'true') return;
  e.preventDefault();
  const clipboard = e.clipboardData || window.clipboardData;
  const text = clipboard ? clipboard.getData('text/plain') : '';
  if(!text) return;
  try{
    document.execCommand('insertText', false, text);
  }catch(err){
    // fallback for browsers without execCommand support: manual insert at cursor
    const sel = window.getSelection();
    if(!sel || sel.rangeCount === 0) return;
    const range = sel.getRangeAt(0);
    range.deleteContents();
    const lines = text.split('\n');
    const frag = document.createDocumentFragment();
    lines.forEach((line, i)=>{
      frag.appendChild(document.createTextNode(line));
      if(i < lines.length - 1) frag.appendChild(document.createElement('br'));
    });
    range.insertNode(frag);
    sel.collapseToEnd();
  }
  target.dispatchEvent(new Event('input', { bubbles: true }));
});

}

// Wrap the given Range's contents in a <span style="background:color">, handling
// ranges that span multiple child nodes (e.g. across a <br> or multiple paragraphs).
function wrapRangeWithHighlight(range, colorHex){
  const span = document.createElement('span');
  span.className = 'user-highlight';
  span.style.backgroundColor = colorHex;
  try{
    range.surroundContents(span);
  }catch(e){
    const frag = range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
  }
}

function clearHighlightsInRange(root, range){
  const spans = root.querySelectorAll('span.user-highlight');
  spans.forEach(span=>{
    if(range.intersectsNode(span)){
      const parent = span.parentNode;
      while(span.firstChild) parent.insertBefore(span.firstChild, span);
      parent.removeChild(span);
    }
  });
}

async function persistManualHighlight(){
  if(!highlighterManualCtx) return;
  const { blockId, field, lawKey, no } = highlighterManualCtx;

}

function applyHighlight(colorOrNull){
  if(highlighterMode === 'manual'){
    if(!highlighterManualCtx || !savedManualRange) return;
    const block = document.getElementById(highlighterManualCtx.blockId);
    if(block){
      if(colorOrNull){
        wrapRangeWithHighlight(savedManualRange, colorOrNull);
      } else {
        clearHighlightsInRange(block, savedManualRange);
      }
      persistManualHighlight();
    }
    document.getElementById('highlighterPopover').style.display = 'none';
    return;
  }
  if(!highlighterTarget) return;
  highlighterTarget.focus();
  try{ document.execCommand('hiliteColor', false, colorOrNull || 'transparent'); }catch(e){}
  highlighterTarget.dispatchEvent(new Event('input', {bubbles:true}));
  document.getElementById('highlighterPopover').style.display = 'none';
}

function openHighlighterPopover(triggerBtn, target){
  buildHighlighterSwatches();

  highlighterManualCtx = null;

}

function openManualHighlighterPopover(triggerBtn, blockId, field, lawKey, no){
  const sel = window.getSelection();
  if(!sel || sel.rangeCount === 0 || sel.isCollapsed){
    alert('請先選取一段文字，再點螢光筆');
    return;
  }
  const range = sel.getRangeAt(0).cloneRange();
  const block = document.getElementById(blockId);
  if(!block || !block.contains(range.commonAncestorContainer)){
    alert('請選取這個區塊裡的文字');
    return;
  }
  buildHighlighterSwatches();
  highlighterMode = 'manual';
  highlighterManualCtx = { blockId, field, lawKey, no };
  savedManualRange = range;
  positionHighlighterPopover(triggerBtn);
}

function positionHighlighterPopover(triggerBtn){
  const pop = document.getElementById('highlighterPopover');
  const rect = triggerBtn.getBoundingClientRect();
  pop.style.display = 'flex';
  const popRect = pop.getBoundingClientRect();
  let top = rect.bottom + 6;
  let left = rect.left;
  if(left + popRect.width > window.innerWidth - 10) left = window.innerWidth - popRect.width - 10;
  if(top + popRect.height > window.innerHeight - 10) top = rect.top - popRect.height - 6;
  pop.style.top = `${top}px`;
  pop.style.left = `${left}px`;
}

function wireFmtButtons(root){
  root.querySelectorAll('.fmt-btn').forEach(btn=>{
    if(btn._wired) return;
    btn._wired = true;
    btn.addEventListener('mousedown', (e)=>{ e.preventDefault(); });
    btn.addEventListener('click', ()=>{
      const target = document.getElementById(btn.dataset.target);
      if(!target) return;
      if(btn.classList.contains('highlighter-btn')){
        target.focus();
        openHighlighterPopover(btn, target);
        return;
      }
      target.focus();
      const cmd = btn.dataset.cmd;
      try{
        if(cmd === 'createLink'){
          const sel = window.getSelection();
          const hasSelection = sel && sel.toString().trim().length > 0;
          let url = prompt(hasSelection ? '請輸入這段文字要連結的網址：' : '請輸入網址（會直接插入為連結文字）：', 'https://');
          if(!url) return;
          if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
          if(hasSelection){
            document.execCommand('createLink', false, url);
          } else {
            document.execCommand('insertHTML', false, `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
          }
        } else {
          document.execCommand(cmd, false, null);
        }
      }catch(e){}
      target.dispatchEvent(new Event('input', {bubbles:true}));
    });
  });
}

    });
  });

      input.style.display = 'none';

function cssSafe(str){ return str.replace(/[^a-zA-Z0-9]/g, '_'); }
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// Convert a stored value into safe innerHTML for a contenteditable note area.
// Legacy/seed values are plain text (no tags) and need escaping + newline->br.
// Once a note has been edited, the stored value is already real HTML (from
// contenteditable's own innerHTML), so it's used as-is.
function toEditableHtml(raw){
  if(!raw) return '';
  if(/<[a-z][\s\S]*>/i.test(raw)) return raw;
  return escapeHtml(raw).replace(/\n/g,'<br>');
}

// Strip HTML tags down to plain text, for search matching.
function htmlToText(html){
  if(!html) return '';
  const div = document.createElement('div');
  div.innerHTML = html;
  return div.textContent || '';
}

function renderOriginalBlock(paragraphs, blockId, overrideHtml){
  if(overrideHtml){
    return `<div class="law-article-block" id="${blockId}">${overrideHtml}</div>`;
  }
  if(!paragraphs || paragraphs.length === 0) return '';
  if(paragraphs.length === 1){
    return `<div class="law-article-block single" id="${blockId}"><div class="law-para-text">${escapeHtml(paragraphs[0]).replace(/\n/g,'<br>')}</div></div>`;
  }
  const rows = paragraphs.map((p, i)=>`
    <div class="law-para-row">
      <span class="law-para-num">${i+1}</span>
      <span class="law-para-text">${escapeHtml(p).replace(/\n/g,'<br>')}</span>
    </div>`).join('');
  return `<div class="law-article-block" id="${blockId}">${rows}</div>`;
}

function renderEnglishBlock(paragraphs, blockId, overrideHtml){
  if(overrideHtml){
    return `<div class="english-block" id="${blockId}">${overrideHtml}</div>`;
  }
  if(!paragraphs || paragraphs.length === 0){
    return `<div class="english-block empty" id="${blockId}">尚無英文對照，你可以自行補上，或請我之後協助整理。</div>`;
  }
  if(paragraphs.length === 1){
    return `<div class="english-block" id="${blockId}"><div class="eng-para">${escapeHtml(paragraphs[0]).replace(/\n/g,'<br>')}</div></div>`;
  }
  const rows = paragraphs.map((p, i)=>`<div class="eng-para"><span class="eng-num">${i+1}.</span>${escapeHtml(p).replace(/\n/g,'<br>')}</div>`).join('');
  return `<div class="english-block" id="${blockId}">${rows}</div>`;
}

];
// categories the user has manually collapsed/expanded this session (default: all open)
const categoryCollapsed = {};

function buildLawNav(){
  const lawNav = document.getElementById('lawNav');
  lawNav.innerHTML = '';

  const searching = !!lawSearchQuery;
  const usedKeys = new Set();

  const makeLawItem = (key)=>{
    const title = DATA[key].title;
    const li = document.createElement('li');
    li.className = 'law-item';
    const btn = document.createElement('button');
    btn.className = 'law-btn';
    btn.dataset.key = key;
    if(key === currentLaw) btn.classList.add('active');
    btn.innerHTML = `<span>${title}</span><span class="law-count">${DATA[key].articles.length}</span>`;
    btn.addEventListener('click', ()=>{
      currentLaw = key;
      currentChapter = 'all';
      currentQuery = '';
      const si = document.getElementById('searchInput');
      if(si) si.value = '';
      render();
    });
    const delBtn = document.createElement('button');
    delBtn.className = 'law-delete-btn';
    delBtn.title = `刪除「${title}」這個科目`;
    delBtn.textContent = '🗑';
    delBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      deleteLawSubject(key, title);
    });
    li.appendChild(btn);
    li.appendChild(delBtn);
    return li;
  };

  const matchesSearch = (key)=>{
    if(!searching) return true;
    return DATA[key].title.toLowerCase().includes(lawSearchQuery.toLowerCase());
  };

  for(const cat of LAW_CATEGORIES){
    const present = cat.keys.filter(k => DATA[k] && matchesSearch(k));
    cat.keys.forEach(k => { if(DATA[k]) usedKeys.add(k); });
    if(present.length === 0) continue;

    const catLi = document.createElement('li');
    catLi.className = 'law-cat';
    const header = document.createElement('button');
    header.className = 'law-cat-header';
    // while searching, force categories open so matches are visible
    const collapsed = searching ? false : !!categoryCollapsed[cat.name];
    header.innerHTML = `<span class="law-cat-arrow">${collapsed ? '▸' : '▾'}</span><span>${cat.name}</span><span class="law-cat-count">${present.length}</span>`;
    header.addEventListener('click', ()=>{
      categoryCollapsed[cat.name] = !categoryCollapsed[cat.name];
      buildLawNav();
    });
    catLi.appendChild(header);

    if(!collapsed){
      const inner = document.createElement('ul');
      inner.className = 'law-cat-body';
      present.forEach(key => inner.appendChild(makeLawItem(key)));
      catLi.appendChild(inner);
    }
    lawNav.appendChild(catLi);
  }

  // anything not covered by the category map (e.g. newly imported subjects) goes to 其他
  const leftovers = lawKeys.filter(k => !usedKeys.has(k) && matchesSearch(k));
  if(leftovers.length > 0){
    const catLi = document.createElement('li');
    catLi.className = 'law-cat';
    const header = document.createElement('button');
    header.className = 'law-cat-header';
    const collapsed = searching ? false : !!categoryCollapsed['其他'];
    header.innerHTML = `<span class="law-cat-arrow">${collapsed ? '▸' : '▾'}</span><span>其他</span><span class="law-cat-count">${leftovers.length}</span>`;
    header.addEventListener('click', ()=>{
      categoryCollapsed['其他'] = !categoryCollapsed['其他'];
      buildLawNav();
    });
    catLi.appendChild(header);
    if(!collapsed){
      const inner = document.createElement('ul');
      inner.className = 'law-cat-body';
      leftovers.forEach(key => inner.appendChild(makeLawItem(key)));
      catLi.appendChild(inner);
    }
    lawNav.appendChild(catLi);
  }
}

async function deleteLawSubject(key, title){
  const confirmText = prompt(`確定要刪除「${title}」嗎？這會清掉這科所有的條文、筆記、圖片、PDF附件等資料，無法復原。\n\n請輸入「刪除」兩個字確認：`);
  if(confirmText !== '刪除') return;

  const label = document.getElementById('exportProgressLabel');
  if(label) label.textContent = `刪除「${title}」中…`;

  const perArticlePrefixes = [
    'note::', 'exam::', 'answerCopy::', 'originalText::',
    'origHighlight::', 'engHighlight::', 'tested::',
    'examimg::', 'pdfmeta::', 'attachpdfmeta::',
    'pdfchunk::', 'attachpdfchunk::'
  ];
  try{
    for(const prefix of perArticlePrefixes){
      const fullPrefix = `${prefix}${key}::`;
      try{
        const listRes = await window.storage.list(fullPrefix, false);
        const keys = (listRes && listRes.keys) || [];
        for(const k of keys){
          try{ await window.storage.delete(k, false); }catch(e){}
        }
      }catch(e){}
    }
    try{ await window.storage.delete(`unclassified::${key}`, false); }catch(e){}
    await window.storage.delete(`lawcontent::${key}`, false);

    delete DATA[key];
    lawKeys = Object.keys(DATA);
    if(currentLaw === key){
      currentLaw = lawKeys[0] || null;
      currentChapter = 'all';
      currentQuery = '';

// ---------- Minimal dependency-free ZIP writer (STORE method, no compression) ----------
// Standard ZIP file format, hand-written so this works offline with no external library.
const CRC32_TABLE = (()=>{
  const table = new Uint32Array(256);
  for(let n=0;n<256;n++){
    let c = n;
    for(let k=0;k<8;k++){
      c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    }
    table[n] = c >>> 0;
  }
  return table;
})();

function crc32(bytes){
  let crc = 0xFFFFFFFF;
  for(let i=0;i<bytes.length;i++){
    crc = CRC32_TABLE[(crc ^ bytes[i]) & 0xFF] ^ (crc >>> 8);
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function dosDateTime(){
  const d = new Date();
  const time = ((d.getHours() & 0x1F) << 11) | ((d.getMinutes() & 0x3F) << 5) | ((d.getSeconds() >> 1) & 0x1F);
  const date = (((d.getFullYear()-1980) & 0x7F) << 9) | (((d.getMonth()+1) & 0xF) << 5) | (d.getDate() & 0x1F);
  return { time, date };
}

function writeUint32(arr, offset, val){
  arr[offset] = val & 0xFF;
  arr[offset+1] = (val >>> 8) & 0xFF;
  arr[offset+2] = (val >>> 16) & 0xFF;
  arr[offset+3] = (val >>> 24) & 0xFF;
}
function writeUint16(arr, offset, val){
  arr[offset] = val & 0xFF;
  arr[offset+1] = (val >>> 8) & 0xFF;
}

// files: array of { name: string, content: string }  (content is treated as UTF-8 text)
function buildZip(files){
  const encoder = new TextEncoder();
  const { time, date } = dosDateTime();
  const localParts = [];
  const centralParts = [];
  let offset = 0;

  for(const file of files){
    const nameBytes = encoder.encode(file.name);
    const dataBytes = encoder.encode(file.content);
    const crc = crc32(dataBytes);

    const local = new Uint8Array(30 + nameBytes.length);
    writeUint32(local, 0, 0x04034b50);
    writeUint16(local, 4, 20);
    writeUint16(local, 6, 0);
    writeUint16(local, 8, 0); // no compression (store)
    writeUint16(local, 10, time);
    writeUint16(local, 12, date);
    writeUint32(local, 14, crc);
    writeUint32(local, 18, dataBytes.length);
    writeUint32(local, 22, dataBytes.length);
    writeUint16(local, 26, nameBytes.length);
    writeUint16(local, 28, 0);
    local.set(nameBytes, 30);

    localParts.push(local, dataBytes);

    const central = new Uint8Array(46 + nameBytes.length);
    writeUint32(central, 0, 0x02014b50);
    writeUint16(central, 4, 20);
    writeUint16(central, 6, 20);
    writeUint16(central, 8, 0);
    writeUint16(central, 10, 0);
    writeUint16(central, 12, time);
    writeUint16(central, 14, date);
    writeUint32(central, 16, crc);
    writeUint32(central, 20, dataBytes.length);
    writeUint32(central, 24, dataBytes.length);
    writeUint16(central, 28, nameBytes.length);
    writeUint16(central, 30, 0);
    writeUint16(central, 32, 0);
    writeUint16(central, 34, 0);
    writeUint16(central, 36, 0);
    writeUint32(central, 38, 0);
    writeUint32(central, 42, offset);
    central.set(nameBytes, 46);

    centralParts.push(central);
    offset += local.length + dataBytes.length;
  }

  const centralStart = offset;
  let centralSize = 0;
  for(const c of centralParts) centralSize += c.length;

  const end = new Uint8Array(22);
  writeUint32(end, 0, 0x06054b50);
  writeUint16(end, 4, 0);
  writeUint16(end, 6, 0);
  writeUint16(end, 8, files.length);
  writeUint16(end, 10, files.length);
  writeUint32(end, 12, centralSize);
  writeUint32(end, 16, centralStart);
  writeUint16(end, 20, 0);

  return new Blob([...localParts, ...centralParts, end], { type: 'application/zip' });
}

async function ensureAllFieldsLoadedForGlobalSearch(){

  ])));

function highlightMatch(text, query){
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if(idx === -1) return escapeHtml(text.slice(0, 140));
  const start = Math.max(0, idx - 40);
  const end = Math.min(text.length, idx + query.length + 60);
  const before = escapeHtml(text.slice(start, idx));
  const match = escapeHtml(text.slice(idx, idx + query.length));
  const after = escapeHtml(text.slice(idx + query.length, end));
  return `${start > 0 ? '…' : ''}${before}<mark>${match}</mark>${after}${end < text.length ? '…' : ''}`;
}

function runGlobalSearch(query){
  const q = query.trim().toLowerCase();
  const overlay = document.getElementById('globalSearchOverlay');
  const resultsEl = document.getElementById('globalSearchResults');
  const titleEl = document.getElementById('globalSearchTitle');
  if(!q){
    overlay.style.display = 'none';
    return;
  }
  overlay.style.display = 'flex';

  const results = [];
  const FIELD_LABELS = { original: '法條原文', note: '我的筆記', answerCopy: '抄答案', exam: '考題研究' };

  for(const lawKey of lawKeys){
    const law = DATA[lawKey];
    if(!law) continue;
    for(const a of law.articles){
      const fieldsToCheck = [
        ['original', a.original.join('\n')],
        ['note', htmlToText(getFieldValue('note', lawKey, a.no, a.note))],
        ['answerCopy', htmlToText(getFieldValue('answerCopy', lawKey, a.no, a.answerCopy || ''))],
        ['exam', htmlToText(getFieldValue('exam', lawKey, a.no, a.exam || ''))]
      ];
      for(const [field, text] of fieldsToCheck){
        if(text && text.toLowerCase().includes(q)){
          results.push({ lawKey, lawTitle: law.title, a, field, text });
          break; // one hit per article is enough for the result list
        }
      }
      if(results.length >= 300) break;
    }
    if(results.length >= 300) break;
  }

  titleEl.textContent = `跨科目搜尋結果（共 ${results.length}${results.length>=300?'+':''} 則）`;
  if(results.length === 0){
    resultsEl.innerHTML = `<div class="empty-state"><div class="big">沒有找到符合的內容</div>試試其他關鍵字</div>`;
    return;
  }
  resultsEl.innerHTML = results.map((r,i)=>`
    <div class="gsr-item" data-idx="${i}">
      <div><span class="gsr-law">${escapeHtml(r.lawTitle)}</span><span class="gsr-no">${escapeHtml(r.a.no)}</span></div>
      <div class="gsr-snippet"><span class="gsr-field-tag">${FIELD_LABELS[r.field]}</span>${highlightMatch(r.text, q)}</div>
    </div>
  `).join('');

  resultsEl.querySelectorAll('.gsr-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const r = results[Number(el.dataset.idx)];
      overlay.style.display = 'none';
      currentLaw = r.lawKey;
      currentChapter = 'all';
      currentRange = null;
      currentQuery = document.getElementById('globalSearchInput').value.trim();
      render();
      setTimeout(()=>{
        const si = document.getElementById('searchInput');
        if(si) si.value = currentQuery;
      }, 50);
    });
  });
}

    const rangeTxt = row.range ? `${row.range[0]}${row.range[1] !== row.range[0] ? '～'+row.range[1] : ''}` : '';

      return `<div class="outline-row lvl-${row.level}">

function renderCards(){
  const law = DATA[currentLaw];
  const q = currentQuery.toLowerCase();

  let rangeStartIdx = -1, rangeEndIdx = -1;
  if(currentRange){
    rangeStartIdx = law.articles.findIndex(a=>a.no===currentRange.startNo);
    rangeEndIdx = law.articles.findIndex(a=>a.no===currentRange.endNo);

// ---------- Bootstrap: load law content from storage, or ask user to import it once ----------
let lastStorageError = null;

async function tryLoadDataFromStorage(){
  const loaded = {};
  lastStorageError = null;
  try{
    const prefix = 'lawcontent::';
    const listRes = await window.storage.list(prefix, false);
    const keys = (listRes && listRes.keys) || [];
    if(keys.length === 0) return null;
    for(const fullKey of keys){
      try{
        const res = await window.storage.get(fullKey, false);
        if(res && typeof res.value === 'string'){
          const shortKey = fullKey.startsWith(prefix) ? fullKey.slice(prefix.length) : fullKey;
          try{
            loaded[shortKey] = normalizeLawObject(shortKey, JSON.parse(res.value));
          }catch(badLaw){
            console.warn(`科目「${shortKey}」的資料格式無效，已略過載入：`, badLaw.message);
          }
        }
      }catch(e){ /* skip this one key, keep whatever else loaded fine */ }
    }
  }catch(e){
    lastStorageError = e;
    return null;
  }
  return Object.keys(loaded).length > 0 ? loaded : null;
}

// Validate + normalize an imported law object so a malformed file (e.g. produced by a
// different tool that doesn't know our schema) can never crash the whole app.
// Throws a descriptive error if the file is fundamentally not a law-content file;
// silently fills in any missing optional fields otherwise.
function normalizeLawObject(key, obj){
  if(!obj || typeof obj !== 'object' || Array.isArray(obj)){
    throw new Error(`「${key}.json」不是有效的科目資料檔（內容不是物件）`);
  }
  if(!Array.isArray(obj.articles) || obj.articles.length === 0){
    throw new Error(`「${key}.json」缺少 articles 條文陣列，格式不符本工具的科目資料格式`);
  }
  obj.title = (typeof obj.title === 'string' && obj.title.trim()) ? obj.title : key;
  obj.unclassified = typeof obj.unclassified === 'string' ? obj.unclassified : '';
  if(!Array.isArray(obj.outline)) obj.outline = [];
  obj.outline = obj.outline.filter(r => r && typeof r === 'object' && typeof r.label === 'string')
    .map(r => ({ level: Number(r.level) || 1, label: r.label, range: (Array.isArray(r.range) && r.range.length === 2) ? r.range : null }));
  const chapterSet = [];
  obj.articles = obj.articles.map((a, i) => {
    const na = (a && typeof a === 'object') ? a : {};
    let original = na.original;
    if(typeof original === 'string') original = [original];
    if(!Array.isArray(original) || original.length === 0) original = ['（無條文內容）'];
    original = original.map(p => typeof p === 'string' ? p : String(p ?? ''));
    const chapter = (typeof na.chapter === 'string' && na.chapter) ? na.chapter : '（無章節標示）';
    if(!chapterSet.includes(chapter)) chapterSet.push(chapter);
    return {
      no: (typeof na.no === 'string' && na.no) ? na.no : `第${i+1}條`,
      title: typeof na.title === 'string' ? na.title : '',
      chapter,
      original,
      english: Array.isArray(na.english) ? na.english.map(p => typeof p === 'string' ? p : String(p ?? '')) : [],
      note: typeof na.note === 'string' ? na.note : '',
      exam: typeof na.exam === 'string' ? na.exam : '',
      answerCopy: typeof na.answerCopy === 'string' ? na.answerCopy : '',
      tested: na.tested,
      images: na.images
    };
  });
  if(!Array.isArray(obj.chapters) || obj.chapters.length === 0) obj.chapters = chapterSet;
  return obj;
}

async function saveOneLawToStorage(key, lawObj, index, total){
  lawObj = normalizeLawObject(key, lawObj);
  await window.storage.set(`lawcontent::${key}`, JSON.stringify(lawObj), false);
  // If this file was produced by "匯出目前資料", it may also carry per-article
  // tested-status and images that live under their own storage keys — restore those too.
  if(Array.isArray(lawObj.articles)){
    for(const a of lawObj.articles){
      if(a.tested === 'yes' || a.tested === 'no'){
        try{ await window.storage.set(`tested::${key}::${a.no}`, a.tested, false); }catch(e){}
      }
      if(Array.isArray(a.images) && a.images.length > 0){
        try{ await window.storage.set(`examimg::${key}::${a.no}`, JSON.stringify(a.images), false); }catch(e){}
      }
    }
  }
  const bar = document.getElementById('importProgressBar');
  const label = document.getElementById('importProgressLabel');
  if(bar) bar.style.width = `${Math.round((index/total)*100)}%`;
  if(label) label.textContent = `匯入中… ${index} / ${total}（${lawObj.title || key}）`;
}

function showImportScreen(errorMsg){
  document.getElementById('appRoot').outerHTML = `
    <div class="import-screen" id="appRoot">
      <div class="import-card">
        <div class="import-icon">⚖</div>
        <h2>請先匯入你的法規資料檔</h2>
        <p>把你要用的科目 .json 檔案解壓縮到同一個資料夾（不一定要全部科目，只匯入你需要的也可以），
        點下方按鈕後，在檔案選擇視窗裡<b>選取你要匯入的 .json 檔案</b>（可一次選多個）。<br>
        只需要匯入這一次，之後資料會保存在這個 artifact 裡，重新打開不用再匯入。</p>
        ${errorMsg ? `<p class="import-error">匯入失敗：${errorMsg}</p>` : ''}
        <label class="import-file-btn">
          選擇資料檔（可一次選多個 .json）
          <input type="file" id="importFileInput" accept="application/json" multiple style="display:none;">
        </label>
        <div class="import-progress-wrap" id="importProgressWrap" style="display:none;">
          <div class="import-progress-bar-bg"><div class="import-progress-bar" id="importProgressBar"></div></div>
          <div class="import-progress-label" id="importProgressLabel"></div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('importFileInput').addEventListener('change', async (e)=>{
    const files = Array.from(e.target.files || []);
    if(files.length === 0) return;
    document.getElementById('importProgressWrap').style.display = 'block';
    const label = document.getElementById('importProgressLabel');
    try{
      for(let i=0;i<files.length;i++){
        const file = files[i];
        const key = file.name.replace(/\.json$/i, '');
        if(label) label.textContent = `讀取中… ${i+1} / ${files.length}（${file.name}）`;
        const text = await file.text();
        const lawObj = JSON.parse(text);
        await saveOneLawToStorage(key, lawObj, i+1, files.length);
      }
      // Re-check storage for whatever subjects have been imported so far (no fixed
      // list required — different people can import different combinations of subjects).
      if(label) label.textContent = '確認資料完整性…';
      const complete = await tryLoadDataFromStorage();
      if(!complete){
        const detail = lastStorageError ? `（底層錯誤：${lastStorageError.message || lastStorageError}）` : '';
        showImportScreen(`沒有偵測到任何有效的科目資料，請確認選取的是正確的 .json 檔案${detail}`);
        return;
      }
      DATA = complete;
      startApp();
    }catch(err){
      showImportScreen(err.message || String(err));
    }
  });
}

function startApp(){
  lawKeys = Object.keys(DATA);
  currentLaw = lawKeys[0];
  buildAppShell();
  render();
}

// ---------- Login screen (only used for the Firebase-backed build) ----------
function showLoginScreen(errorMsg){
  document.getElementById('appRoot').outerHTML = `
    <div class="import-screen" id="appRoot">
      <div class="import-card">
        <div class="import-icon">⚖</div>
        <h2>登入以同步你的資料</h2>
        <p>用電子郵件＋密碼登入。第一次使用請按「註冊新帳號」；之後在任何裝置上，用同一組帳密登入，筆記就會自動同步。</p>
        ${errorMsg ? `<p class="import-error">${escapeHtml(errorMsg)}</p>` : ''}
        <input type="email" id="loginEmail" placeholder="電子郵件" class="login-input">
        <input type="password" id="loginPassword" placeholder="密碼（至少6碼）" class="login-input">
        <div class="login-btn-row">
          <button id="loginBtn" class="import-file-btn login-btn">登入</button>
          <button id="registerBtn" class="import-file-btn login-btn login-btn-secondary">註冊新帳號</button>
        </div>
        <div class="import-progress-label" id="loginStatusLabel"></div>
      </div>
    </div>
  `;
  const emailEl = document.getElementById('loginEmail');
  const passEl = document.getElementById('loginPassword');
  const statusEl = document.getElementById('loginStatusLabel');

  document.getElementById('loginBtn').addEventListener('click', async ()=>{
    statusEl.textContent = '登入中…';
    try{
      await window.__firebase.signInWithEmailAndPassword(window.__firebase.auth, emailEl.value.trim(), passEl.value);
      // onAuthStateChanged will pick this up and proceed automatically
    }catch(err){
      showLoginScreen(loginErrorMessage(err));
    }
  });
  document.getElementById('registerBtn').addEventListener('click', async ()=>{
    statusEl.textContent = '註冊中…';
    try{
      await window.__firebase.createUserWithEmailAndPassword(window.__firebase.auth, emailEl.value.trim(), passEl.value);
    }catch(err){
      showLoginScreen(loginErrorMessage(err));
    }
  });
}

function loginErrorMessage(err){
  const code = err && err.code || '';
  if(code.includes('invalid-email')) return '電子郵件格式不正確';
  if(code.includes('email-already-in-use')) return '這個電子郵件已經註冊過了，請直接按「登入」';
  if(code.includes('weak-password')) return '密碼太短，至少需要 6 碼';
  if(code.includes('user-not-found') || code.includes('invalid-credential') || code.includes('wrong-password')) return '帳號或密碼不正確';
  return '發生錯誤：' + (err && err.message || String(err));
}

// ---------- Decide which storage backend to use, then start the app ----------
function waitForFirebaseModule(timeoutMs = 4000){
  return new Promise((resolve)=>{
    if(window.__firebase){ resolve(true); return; }
    let done = false;
    const finish = (ok)=>{
      if(done) return;
      done = true;
      window.removeEventListener('firebase-ready', onReady);
      window.removeEventListener('firebase-failed', onFailed);
      resolve(ok);
    };
    const onReady = ()=> finish(true);
    const onFailed = ()=> finish(false);
    window.addEventListener('firebase-ready', onReady, { once:true });
    window.addEventListener('firebase-failed', onFailed, { once:true });
    setTimeout(()=> finish(!!window.__firebase), timeoutMs);
  });
}

async function initStorageBackend(){
  if(CLAUDE_STORAGE_AVAILABLE){
    // window.storage already provided natively — nothing to do.
    runBootstrap();
    return;
  }
  // The Firebase SDK loads as an ES module, which executes slightly later than
  // this classic script — wait briefly for it before deciding it's unavailable.
  await waitForFirebaseModule();
  if(window.__firebase){
    const logoutBtn = document.getElementById('logoutBtn');
    logoutBtn.style.display = 'block';
    logoutBtn.addEventListener('click', async ()=>{
      await window.__firebase.signOut(window.__firebase.auth);
      location.reload();
    });
    window.__firebase.onAuthStateChanged(window.__firebase.auth, (user)=>{
      if(user){
        window.storage = makeFirestoreBackend(user.uid);
        const badge = document.getElementById('accountBadge');
        if(badge){
          badge.style.display = 'flex';
          badge.innerHTML = `<span class="acc-icon">👤</span><span>${escapeHtml(user.email || '已登入')}</span>`;
        }
        runBootstrap();
      } else {
        logoutBtn.style.display = 'none';
        const badge = document.getElementById('accountBadge');
        if(badge) badge.style.display = 'none';
        showLoginScreen(null);
      }
    });
    return;
  }
  window.storage = makeLocalStorageBackend();
  runBootstrap();
}

async function runBootstrap(){
  try{
    const existing = await tryLoadDataFromStorage();
    if(existing){
      DATA = existing;
      startApp();
    } else {
      showImportScreen(null);
    }
  }catch(err){
    const root = document.getElementById('appRoot');
    if(root){
      root.innerHTML = `<div style="padding:40px;color:#9e2a2b;font-family:sans-serif;">
        <b>啟動時發生錯誤：</b>${(err && err.message) || String(err)}
      </div>`;
    }
  }
}

initStorageBackend();
</script>
